name: Build and release Windows installer
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release-windows:
    runs-on: windows-latest
    env:
      PYTHON_VERSION: '3.10'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6 pypdf requests

      - name: Get version from tag
        id: get_version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --icon=app_icon.ico main.py
          mkdir release_artifacts
          copy dist\\main.exe release_artifacts\\PDFConverter.exe
        shell: cmd

      - name: Install NSIS
        run: |
          choco install nsis -y
        shell: cmd

      - name: Make installer with NSIS
        run: |
          REM installer.nsi should write installer to release_artifacts\PDFConverter-setup.exe
          makensis installer.nsi
          set VERSION=%TAG%
          powershell -Command "Rename-Item -Path 'release_artifacts\\PDFConverter-setup.exe' -NewName \"PDFConverter-setup-%VERSION%.exe\""
        shell: cmd
        env:
          TAG: ${{ steps.get_version.outputs.TAG }}

      - name: Compute SHA256
        run: |
          set VERSION=%TAG%
          powershell -Command "Get-FileHash -Path \"release_artifacts\\PDFConverter-setup-%VERSION%.exe\" -Algorithm SHA256 | ForEach-Object { $_.Hash }" > release_artifacts\\PDFConverter-setup-%VERSION%.exe.sha256
        shell: cmd
        env:
          TAG: ${{ steps.get_version.outputs.TAG }}

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: "Automated release for ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release_artifacts/PDFConverter-setup-${{ steps.get_version.outputs.TAG }}.exe
          asset_name: PDFConverter-setup-${{ steps.get_version.outputs.TAG }}.exe
          asset_content_type: application/octet-stream

      - name: Upload sha256 asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release_artifacts/PDFConverter-setup-${{ steps.get_version.outputs.TAG }}.exe.sha256
          asset_name: PDFConverter-setup-${{ steps.get_version.outputs.TAG }}.exe.sha256
          asset_content_type: text/plain
